services:
  - type: web
    name: altfit
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm run start
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://altfit-6fma.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://altfit-6fma.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://euwyvotkrbivyahysuqm.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        value: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
      # ⚠️ SENSITIVE: Must be set in Render dashboard Environment tab
      # All variables below must be added manually to the Render dashboard
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: DIRECT_URL
        value: ${DIRECT_URL}
      - key: JWT_SECRET
        value: ${JWT_SECRET}
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: ${SUPABASE_SERVICE_ROLE_KEY}
      - key: SUPABASE_SERVICE_KEY
        value: ${SUPABASE_SERVICE_KEY}
      - key: ANTHROPIC_API_KEY
        value: ${ANTHROPIC_API_KEY}
      - key: GOOGLE_CLIENT_ID
        value: ${GOOGLE_CLIENT_ID}
      - key: GOOGLE_SECRET_KEY
        value: ${GOOGLE_SECRET_KEY}
      - key: GEMINI_API_KEY
        value: ${GEMINI_API_KEY}
      - key: RAZORPAY_KEY_ID
        value: ${RAZORPAY_KEY_ID}
      - key: RAZORPAY_KEY_SECRET
        value: ${RAZORPAY_KEY_SECRET}
      - key: RESEND_API_KEY
        value: ${RESEND_API_KEY}
      - key: CRON_SECRET
        value: ${CRON_SECRET}

crons:
  - name: daily-email-agent
    schedule: "30 2 * * *"   # 2:30 AM UTC = 8:00 AM IST
    command: >
      curl -s -X POST https://altfit-6fma.onrender.com/api/emails/daily
      -H "Authorization: Bearer $CRON_SECRET"
      -H "Content-Type: application/json"
