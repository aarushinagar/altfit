name: CI

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]

jobs:
    test-and-lint:
        name: Test & Lint
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            # prisma generate (runs via postinstall) does not need a real DB connection.
            # We set a dummy DATABASE_URL so the env var exists and the prisma client
            # is generated successfully during `npm ci`.
            - name: Install dependencies
              run: npm ci
              env:
                  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"

            - name: Run unit tests
              run: npm test -- --exclude "**/vision.test.ts"
              env:
                  # Tests mock all external services; no real connections are made.
                  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"
                  GEMINI_API_KEY: "test-key"

            - name: TypeScript type-check
              run: npx tsc --noEmit
              env:
                  DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db"

            - name: Lint
              # Reports lint issues but does not fail the build — pre-existing
              # warnings in unchanged files should not block CI. Tests + tsc are blocking.
              run: npm run lint
              continue-on-error: true
